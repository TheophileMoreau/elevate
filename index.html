<link rel="stylesheet" href="style.css">

<body>

	<div class="doors">
		<div class="elevator-door" id="left-door">
			<div class="elevator-inside-door"></div>
		</div>
		<div class="elevator-door" id="right-door">
			<div class="elevator-inside-door"></div>
		</div>
	</div>

	<div class="container">

		<div class="title-container">
			<div class="title" id="current-stage">
				0
			</div>
		</div>

		<div class="elevator-container">
			<!-- Elevator 1 -->
			<div class="elevator" id="elevator1">
				<div class="position" id="elevator1-position">Loading...</div>
				<div class="counter-container">
					<button class="counter-button minus-button" id="elevator1-minus">-</button>
					<input type="number" class="counter-input" value="0" id="elevator1-input">
					<button class="counter-button plus-button" id="elevator1-plus">+</button>
				</div>
				<div class="button-container">
					<button class="go-button" id="elevator1-gotobutton">Go to</button>
				</div>
			</div>

			<!-- Elevator 2 -->
			<div class="elevator" id="elevator2">
				<div class="position" id="elevator2-position">Loading...</div>
				<div class="counter-container">
					<button class="counter-button minus-button" id="elevator2-minus">-</button>
					<input type="number" class="counter-input" value="0" id="elevator2-input">
					<button class="counter-button plus-button" id="elevator2-plus">+</button>
				</div>
				<div class="button-container">
					<button class="go-button" id="elevator2-gotobutton">Go to</button>
				</div>
			</div>

			<!-- Elevator 3 -->
			<div class="elevator" id="elevator3">
				<div class="position" id="elevator3-position">Loading...</div>
				<div class="counter-container">
					<button class="counter-button minus-button" id="elevator3-minus">-</button>
					<input type="number" class="counter-input" value="0" id="elevator3-input">
					<button class="counter-button plus-button" id="elevator3-plus">+</button>
				</div>
				<div class="button-container">
					<button class="go-button" id="elevator3-gotobutton">Go to</button>
				</div>
			</div>

			<!-- Elevator 4 -->
			<div class="elevator" id="elevator4">
				<div class="position" id="elevator4-position">Loading...</div>
				<div class="counter-container">
					<button class="counter-button minus-button" id="elevator4-minus">-</button>
					<input type="number" class="counter-input" value="0" id="elevator4-input">
					<button class="counter-button plus-button" id="elevator4-plus">+</button>
				</div>
				<div class="button-container">
					<button class="go-button" id="elevator4-gotobutton">Go to</button>
				</div>
			</div>

		</div>
		<div class="inside-container">
			<div class="down-title">
				Best :
			</div>
			<div class="down-title" id="best-score">
				0
			</div>
		</div>

	</div>
</body>

<script src="./js/utils.js"></script>
<script src="./js/index.js"></script>
<script src="./js/listeners.js"></script>
<script src="./js/ui.js"></script>
