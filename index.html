<link rel="stylesheet" href="style.css">

<body>
	<div class="elevator-door" id="left-door">
		<div class="elevator-inside-door"></div>
	</div>
	<div class="elevator-door" id="right-door">
		<div class="elevator-inside-door"></div>
	</div>
	<div class="container">
		<div class="inside-container">
			<div class="title" id="current-stage">
				0
			</div>
		</div>
		<div class="elevator-container">
			<!-- Elevator 1 -->
			<div class="elevator" id="elevator1">
				<div class="position" id="elevator1-position">Loading...</div>
				<div class="floor-selection" id="elevator1-selection">
					<div class="button-container">
						<button class="one-button" id="elevator1-one-button">+1</button>
						<button class="ten-button" id="elevator1-ten-button">+10</button>
					</div>
					<button class="add-button" id="elevator1-button">Add 10</button>
				</div>
			</div>

			<!-- Elevator 2 -->
			<div class="elevator" id="elevator2">
				<div class="position" id="elevator2-position">Loading...</div>
				<div class="floor-selection" id="elevator2-selection">
					<div class="button-container">
						<button class="one-button" id="elevator2-one-button">+1</button>
						<button class="ten-button" id="elevator2-ten-button">+10</button>
					</div>
					<button class="add-button" id="elevator2-button">Add 10</button>
				</div>
			</div>

			<!-- Elevator 3 -->
			<div class="elevator" id="elevator3">
				<div class="position" id="elevator3-position">Loading...</div>
				<div class="floor-selection" id="elevator3-selection">
					<div class="button-container">
						<button class="one-button" id="elevator3-one-button">+1</button>
						<button class="ten-button" id="elevator3-ten-button">+10</button>
					</div>
					<button class="add-button" id="elevator3-button">Add 10</button>
				</div>
			</div>

			<!-- Elevator 4 -->
			<div class="elevator" id="elevator4">
				<div class="position" id="elevator4-position">Loading...</div>
				<div class="floor-selection" id="elevator4-selection">
					<div class="button-container">
						<button class="one-button" id="elevator4-one-button">+1</button>
						<button class="ten-button" id="elevator4-ten-button">+10</button>
					</div>
					<button class="add-button" id="elevator4-button">Add 10</button>
				</div>
			</div>
		</div>
		<div class="inside-container">
			<div class="down-title">
				Best :
			</div>
			<div class="down-title" id="best-score">
				0
			</div>
		</div>
	</div>
</body>

<script src="./index.js"></script>
